name: secret

on:
  push:

jobs:
  use-secret:
    runs-on: ubuntu-latest

    env:
      SECRET_VALUE: ${{ secrets.SECRET }}

    steps:
      - name: Verify secret exists
        run: echo "Secret configured"

      - name: Print literal secret reference
        run: echo 'echo "The secret is ${{ ''${{ secrets.SECRET }}'' }}"'
