name: secret

on:
  push:

jobs:
  use-secret:
    runs-on: ubuntu-latest

    env:
      SECRET_VALUE: ${{ secrets.SECRET }}

    steps:
      - name: Safe secret reference
        run: echo "The secret is \${{ secrets.SECRET }}"

      - name: Use secret without exposing it
        run: |
          if [ -n "$SECRET_VALUE" ]; then
            echo "Secret is configured"
          fi
